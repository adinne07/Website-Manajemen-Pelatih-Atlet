<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Athlete</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">
  
  <!-- LEFT (FORM) -->
  <div class="left">
    <div class="form-box">
      <h2>ATLET</h2>
      <p class="subtitle">Lampaui Batas. Ukir Prestasi. Jadi Juara.</p>
      <p class="description">Platform manajemen atlet dan pelatih terpadu untuk mengembangkan potensi maksimal Anda</p>

      <h3>Selamat Datang!</h3>

      <form id="loginForm">
        <div class="input-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Masukkan username" required>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Masukkan password" required>
        </div>

        <div class="options">
          <label><input type="checkbox"> Remember me</label>
        </div>

        <button type="submit">Login</button>

        <p class="signup">Belum punya akun? <a href="../register/register.html">Daftar</a></p>
        
        <hr style="margin: 20px 0; border: none; border-top: 1px solid #ccc;">
        
        <p style="font-size: 12px; color: #666; margin-bottom: 10px;">
          <strong>Demo Akun:</strong><br>
          Admin: admin / 12345<br>
          Super Admin: superadmin / super123
      </form>
    </div>
  </div>

  <!-- RIGHT (IMAGE) -->
  <div class="right">
    <div class="overlay">
      <h1></h1>
      <h2></h2>
    </div>
  </div>

</div>

<script src="login.js"></script>
</body>
</html>
