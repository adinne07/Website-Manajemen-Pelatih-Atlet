<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrasi Athlete</title>

  <link rel="stylesheet" href="../../../public/css/auth/register.css">
  <link rel="stylesheet" href="../../../public/css/alert-style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

  <div class="container">

    <a href="../index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i>
    </a>

    <div class="left">
      <div class="form-box">
        <h2>ATLET</h2>

        <p class="subtitle">
          Lampaui Batas. Ukir Prestasi. Jadi Juara.
        </p>

        <p class="description">
          Platform manajemen atlet dan pelatih terpadu untuk mengembangkan potensi maksimal Anda
        </p>

        <h3>Bergabunglah dengan Kami</h3>

        <form id="registerForm">
          <div class="input-group">
            <label for="fullname">Nama Lengkap</label>
            <input type="text" id="fullname" placeholder="Masukkan nama lengkap" required>
          </div>

          <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Masukkan email" required>
          </div>

          <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Masukkan username" required>
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Masukkan password" required>
          </div>

          <div class="input-group">
            <label for="confirmPassword">Konfirmasi Password</label>
            <input type="password" id="confirmPassword" placeholder="Konfirmasi password" required>
          </div>

          <div class="input-group">
            <label for="phone">No. Telepon (Opsional)</label>
            <input type="tel" id="phone" placeholder="Masukkan no. telepon">
          </div>

          <div class="options">
            <label>
              <input type="checkbox" id="agreeTerms" required>
              Saya setuju dengan <a href="#">Syarat & Ketentuan</a>
            </label>
          </div>

          <button type="submit">Daftar</button>

          <p class="login">
            Sudah punya akun? <a href="login.html">Login</a>
          </p>
        </form>
      </div>
    </div>

    <div class="right">
      <div class="overlay">
        <h1></h1>
        <h2></h2>
      </div>
    </div>

  </div>

  <script src="../../../public/js/custom-alert.js"></script>
  <script src="../../../public/js/auth/register.js"></script>
</body>
</html>
