<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengaturan Sistem - Super Admin ATLET</title>

  <link rel="stylesheet" href="../../../public/css/superadmin/admin-styles.css">
  <link rel="stylesheet" href="../../../public/css/alert-style.css">
</head>

<body>

  <header class="header">
    <div class="header-content">
      <div class="logo">
        <h1>🏅 ATLET - Super Admin</h1>
        <p class="logo-subtitle">Pusat Kontrol Sistem</p>
      </div>

      <div class="header-actions">
        <span class="user-info" id="userInfo">Super Admin</span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>
  </header>

  <aside class="sidebar">
    <nav class="nav-menu">
      <a class="nav-item" href="dashboard.html">📊 Dashboard</a>
      <a class="nav-item" href="kontingen.html">🏢 Manajemen Kontingen</a>
      <a class="nav-item" href="admin.html">👥 Manajemen Admin</a>
      <a class="nav-item" href="monitoring.html">🔍 Monitoring Data</a>
      <a class="nav-item" href="activity-log.html">📝 Activity Log</a>
      <a class="nav-item" href="export.html">📥 Export Data</a>
      <a class="nav-item active" href="settings.html">⚙️ Pengaturan</a>
    </nav>
  </aside>

  <main class="container">
    <section class="page active">
      <h2>⚙️ Pengaturan Sistem</h2>

      <div class="settings-section">
        <h3>🔐 Backup & Restore</h3>
        <button class="btn-primary" onclick="backupData()">💾 Backup Data</button>
        <button class="btn-secondary" onclick="restoreData()">📂 Restore Data</button>
      </div>

      <div class="settings-section">
        <h3>🗑️ Pembersihan Data</h3>
        <button class="btn-danger" onclick="clearOldLogs()">Hapus Log Lama</button>
        <button class="btn-danger" onclick="clearAllData()">⚠️ Hapus Semua Data</button>
      </div>
    </section>
  </main>

  <script src="../../../public/js/custom-alert.js"></script>
  <script src="../../../public/js/superadmin/admin-dashboard.js"></script>
</body>

</html>
