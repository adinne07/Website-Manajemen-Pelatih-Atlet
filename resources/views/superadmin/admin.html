<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen Admin - Super Admin ATLET</title>

  <link rel="stylesheet" href="../../../public/css/superadmin/admin-styles.css">
  <link rel="stylesheet" href="../../../public/css/alert-style.css">
</head>

<body>

  <header class="header">
    <div class="header-content">
      <div class="logo">
        <h1>🏅 ATLET - Super Admin</h1>
        <p class="logo-subtitle">Pusat Kontrol Sistem</p>
      </div>

      <div class="header-actions">
        <span class="user-info" id="userInfo">Super Admin</span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>
  </header>

  <aside class="sidebar">
    <nav class="nav-menu">
      <a class="nav-item" href="dashboard.html">📊 Dashboard</a>
      <a class="nav-item" href="kontingen.html">🏢 Manajemen Kontingen</a>
      <a class="nav-item active" href="admin.html">👥 Manajemen Admin</a>
      <a class="nav-item" href="monitoring.html">🔍 Monitoring Data</a>
      <a class="nav-item" href="activity-log.html">📝 Activity Log</a>
      <a class="nav-item" href="export.html">📥 Export Data</a>
      <a class="nav-item" href="settings.html">⚙️ Pengaturan</a>
    </nav>
  </aside>

  <main class="container">
    <section class="page active">
      <div class="page-header">
        <h2>👥 Manajemen Admin (Pelatih)</h2>

        <button type="button" class="btn-primary" id="openAddAdminBtn" onclick="openAddAdminModal()">
          + Tambah Admin
        </button>
      </div>

      <table class="admin-table">
        <thead>
          <tr>
            <th>Username</th>
            <th>Nama</th>
            <th>Status</th>
            <th>Kontingen</th>
            <th>Aksi</th>
          </tr>
        </thead>

        <tbody id="adminList">
          <tr>
            <td colspan="5" class="empty-state">Loading...</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <div id="addAdminModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Tambah Admin Baru</h3>
        <button type="button" class="close-btn" onclick="closeModal('addAdminModal')">&times;</button>
      </div>

      <div class="modal-body">
        <form id="addAdminForm">
          <div class="form-group">
            <label for="newUsername">Username</label>
            <input type="text" id="newUsername" placeholder="Masukkan username admin" required>
          </div>

          <div class="form-group">
            <label for="newPassword">Password</label>
            <input type="password" id="newPassword" placeholder="Masukkan password admin" required>
          </div>

          <div class="form-group">
            <label for="newName">Nama Lengkap</label>
            <input type="text" id="newName" placeholder="Masukkan nama lengkap admin" required>
          </div>

          <div class="button-group">
            <button type="button" class="btn-secondary" onclick="closeModal('addAdminModal')">
              Batal
            </button>

            <button type="submit" class="btn-primary">
              Simpan Admin
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../../../public/js/custom-alert.js"></script>
  <script src="../../../public/js/superadmin/admin-dashboard.js"></script>
</body>

</html>
